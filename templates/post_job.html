{% extends "base.html" %}

{% block title %}Post New Job{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Post a New Job</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Job Title</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Company</label>
                        <input type="text" name="company" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Location</label>
                        <input type="text" name="location" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Description</label>
                        <textarea name="description" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Requirements</label>
                        <textarea name="requirements" class="form-control" rows="3"></textarea>
                    </div>
                   <div class="row">
                         <div class="col-md-6">
                            <label for="salary_min">Min Salary (LPA)</label>
                                 <input type="number" step="0.5" class="form-control" name="salary_min" id="salary_min" required>
                                 <small class="text-muted">e.g., 3.5 for 3.5 LPA</small>
                        </div>
                        <div class="col-md-6">
                            <label for="salary_max">Max Salary (LPA)</label>
                                <input type="number" step="0.5" class="form-control" name="salary_max" id="salary_max" required>
                                <small class="text-muted">e.g., 8.0 for 8 LPA</small>
                        </div>
                        <div class="col-md-6">
                            <label>Job Type</label>
                            <select name="job_type" class="form-control" required>
                                <option value="full-time">Full Time</option>
                                <option value="part-time">Part Time</option>
                                <option value="internship">Internship</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label>External Link (Optional)</label>
                        <input type="url" name="external_link" class="form-control" placeholder="https://...">
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">Post Job</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
